<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch & Guess Multiplayer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; text-align: center; margin: 0; padding: 20px; color: #333; }
        .hidden { display: none !important; }
        #game-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        #canvas { background: white; border: 3px solid #333; cursor: crosshair; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #sidebar { width: 280px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left; display: flex; flex-direction: column; justify-content: space-between; height: 430px; box-sizing: border-box; }
        #scoreboard { list-style: none; padding: 0; margin: 0 0 15px 0; max-height: 120px; overflow-y: auto; }
        #scoreboard li { padding: 6px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 14px; }
        #chat-box { flex-grow: 1; border: 1px solid #ccc; overflow-y: auto; margin-bottom: 10px; padding: 8px; background: #fafafa; border-radius: 4px; font-size: 14px; }
        #chat-input-container { display: flex; gap: 5px; }
        #guess-input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .give-up-btn { background: #dc3545; margin-top: 10px; width: 100%; padding: 12px; font-size: 16px; }
        .give-up-btn:hover { background: #bd2130; }
        #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #username-input { width: 80%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        #word-display { font-size: 24px; color: #2c3e50; margin: 10px 0; font-weight: bold; background: #dfe6e9; display: inline-block; padding: 5px 20px; border-radius: 20px; }
        #timer { font-size: 20px; color: #d63031; font-weight: bold; }
    </style>
</head>
<body>

    <h1>✏️ Sketch & Guess Multiplayer</h1>

    <div id="login-screen">
        <h2>Welcome!</h2>
        <p>Enter a custom username to join the match:</p>
        <input type="text" id="username-input" placeholder="CoolPainter42" maxlength="15">
        <br>
        <button id="join-btn">Join Game</button>
    </div>

    <div id="game-screen" class="hidden">
        <h2 id="game-status">Waiting for at least 2 players...</h2>
        <div id="timer">Time Left: --:--</div>
        <div id="word-display">Lobby</div>

        <div id="game-container">
            <div>
                <canvas id="canvas" width="500" height="400"></canvas>
                <br>
                <button id="give-up-btn" class="give-up-btn">Give Up / Skip Turn</button>
            </div>

            <div id="sidebar">
                <div>
                    <h3 style="margin-top: 0;">🏆 Players</h3>
                    <ul id="scoreboard"></ul>
                </div>
                
                <div style="display: flex; flex-direction: column; flex-grow: 1;">
                    <h3>💬 Game Chat</h3>
                    <div id="chat-box"></div>
                    <div id="chat-input-container">
                        <input type="text" id="guess-input" placeholder="Type your guess here..." autocomplete="off">
                        <button id="guess-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, onDisconnect, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Setup using your Project Config Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDy6XmdCoe2hVR4yLs110MZbiEnx0m_9tk",
            authDomain: "sketch-and-guess-b8e4e.firebaseapp.com",
            databaseURL: "https://sketch-and-guess-b8e4e-default-rtdb.firebaseio.com/", 
            projectId: "sketch-and-guess-b8e4e",
            storageBucket: "sketch-and-guess-b8e4e.firebasestorage.app",
            messagingSenderId: "422047877804",
            appId: "1:422047877804:web:464f6383d84a052b492d09"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // App HTML Nodes
        const loginScreen = document.getElementById('login-screen');
        const gameScreen = document.getElementById('game-screen');
        const usernameInput = document.getElementById('username-input');
        const joinBtn = document.getElementById('join-btn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gameStatus = document.getElementById('game-status');
        const timerDisplay = document.getElementById('timer');
        const wordDisplay = document.getElementById('word-display');
        const chatBox = document.getElementById('chat-box');
        const guessInput = document.getElementById('guess-input');
        const guessBtn = document.getElementById('guess-btn');
        const giveUpBtn = document.getElementById('give-up-btn');
        const scoreboard = document.getElementById('scoreboard');

        // Local state
        let myUsername = "";
        let isDrawing = false;
        let amIDrawer = false;
        let currentSecretWord = "";
        let totalPlayersCount = 0;
        let gameState = "lobby"; 

        const wordsList = ["apple", "banana", "house", "cat", "dog", "car", "sun", "tree", "computer", "pizza", "airplane", "guitar", "elephant", "football", "sword"];

        // 1. JOIN LOGIC
        joinBtn.addEventListener('click', () => {
            myUsername = usernameInput.value.trim().replace(/[.#$\[\]]/g, ""); // Clean Firebase keys
            if (!myUsername) return alert("Please type a valid username!");

            loginScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');

            // Add client user to firebase
            const playerRef = ref(db, 'players/' + myUsername);
            set(playerRef, { score: 0 });

            // Automatically clean up user if they leave or close tab
            onDisconnect(playerRef).remove();

            setupGameListeners();
            setupCanvasDrawing();
        });

        // 2. CENTRAL REALTIME DATABASE LISTENERS
        function setupGameListeners() {
            // Track Player list changes
            onValue(ref(db, 'players'), (snapshot) => {
                const players = snapshot.val() || {};
                totalPlayersCount = Object.keys(players).length;
                
                // Clear and rebuild scoreboard view
                scoreboard.innerHTML = "";
                Object.keys(players).forEach(name => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${name}</span> <strong>${players[name].score} pts</strong>`;
                    scoreboard.appendChild(li);

                    // Win Check Condition: First to 10 points
                    if (players[name].score >= 10 && gameState !== "gameover") {
                        declareWinner(name);
                    }
                });

                // Lobby Host Controller Logic: Handles starting sequence if 2+ users arrive
                handleLobbyManagement(players);
            });

            // Sync Main Game State Parameters
            onValue(ref(db, 'gameState'), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                gameState = data.state;
                currentSecretWord = data.currentWord || "";

                if (gameState === "lobby") {
                    gameStatus.innerText = "Waiting for players to join...";
                    wordDisplay.innerText = "Lobby";
                    ctx.clearRect(0, 0, canvas.width, canvas.height); 
                } else if (gameState === "countdown") {
                    gameStatus.innerText = "Match is starting soon!";
                    wordDisplay.innerText = "Get Ready!";
                } else if (gameState === "playing") {
                    amIDrawer = (data.drawer === myUsername);
                    
                    if (amIDrawer) {
                        gameStatus.innerText = "YOU ARE THE DRAWER!";
                        wordDisplay.innerText = "Draw this: " + currentSecretWord.toUpperCase();
                        guessInput.disabled = true;
                        guessBtn.disabled = true;
                        giveUpBtn.classList.remove('hidden');
                    } else {
                        gameStatus.innerText = `${data.drawer} is drawing!`;
                        wordDisplay.innerText = "Guess the word!";
                        guessInput.disabled = false;
                        guessBtn.disabled = false;
                        giveUpBtn.classList.add('hidden');
                    }
                }
            });

            // Live Timer Stream Synchronization
            onValue(ref(db, 'gameTimer'), (snapshot) => {
                const time = snapshot.val();
                if (time !== null) {
                    const minutes = Math.floor(time / 60);
                    const seconds = time % 60;
                    timerDisplay.innerText = `Time Left: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                }
            });

            // Live Canvas Stream Synchronization
            onValue(ref(db, 'canvasCommands'), (snapshot) => {
                const cmd = snapshot.val();
                if (!cmd || amIDrawer) return; // Drawers don't draw over themselves

                if (cmd.type === "clear") {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                } else if (cmd.type === "draw") {
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = '#000';
                    if (cmd.isNewStroke) {
                        ctx.beginPath();
                        ctx.moveTo(cmd.x, cmd.y);
                    } else {
                        ctx.lineTo(cmd.x, cmd.y);
                        ctx.stroke();
                    }
                }
            });

            // Global Chat message listener
            onValue(ref(db, 'chat'), (snapshot) => {
                chatBox.innerHTML = "";
                const updates = snapshot.val();
                if (updates) {
                    Object.values(updates).forEach(msg => {
                        const div = document.createElement('div');
                        div.innerHTML = `<strong>${msg.user}:</strong> ${msg.text}`;
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        // 3. CANVAS DRAWING SYSTEM
        function setupCanvasDrawing() {
            function sendDrawAction(x, y, isNewStroke) {
                if (!amIDrawer) return;
                set(ref(db, 'canvasCommands'), { type: "draw", x, y, isNewStroke, timestamp: Date.now() });
            }

            canvas.addEventListener('mousedown', (e) => {
                if (!amIDrawer) return;
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                sendDrawAction(e.clientX - rect.left, e.clientY - rect.top, true);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing || !amIDrawer) return;
                const rect = canvas.getBoundingClientRect();
                sendDrawAction(e.clientX - rect.left, e.clientY - rect.top, false);
            });

            window.addEventListener('mouseup', () => {
                isDrawing = false;
            });
        }

        // 4. CHAT GUESSING IMPLEMENTATION
        function sendChatMessage() {
            const text = guessInput.value.trim();
            if (!text) return;
            guessInput.value = "";

            // Check if Guess is correct
            if (gameState === "playing" && !amIDrawer && text.toLowerCase() === currentSecretWord.toLowerCase()) {
                // Award points to solver via transaction safely
                runTransaction(ref(db, `players/${myUsername}/score`), (currentScore) => {
                    return (currentScore || 0) + 1;
                });
                
                broadcastMessage("System", `🎉 ${myUsername} guessed the correct word: **${currentSecretWord}**!`);
                nextRound();
            } else {
                broadcastMessage(myUsername, text);
            }
        }

        guessBtn.addEventListener('click', sendChatMessage);
        guessInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(); });
        giveUpBtn.addEventListener('click', () => { if(amIDrawer) nextRound(); });

        function broadcastMessage(user, text) {
            const newMsgRef = ref(db, 'chat/' + Date.now());
            set(newMsgRef, { user, text });
        }

        // 5. BACKEND LOBBY & ROUND HANDLERS (Managed seamlessly by active room host)
        let timerInterval = null;
        function handleLobbyManagement(playersList) {
            const playerKeys = Object.keys(playersList);
            // The alpha-first player key acts as room manager/host ticker
            const isHost = playerKeys.sort()[0] === myUsername; 
            if (!isHost) return; 

            if (gameState === "lobby" && playerKeys.length >= 2) {
                update(ref(db, 'gameState'), { state: "countdown" });
                startHostTimer(20, () => {
                    startMatch(playerKeys);
                });
            } else if ((gameState === "playing" || gameState === "countdown") && playerKeys.length < 2) {
                // Reset match if players drop out mid game
                clearInterval(timerInterval);
                set(ref(db, 'gameState'), { state: "lobby" });
                set(ref(db, 'gameTimer'), 0);
                set(ref(db, 'chat'), null);
            }
        }

        function startHostTimer(seconds, callback) {
            clearInterval(timerInterval);
            let timeRemaining = seconds;
            set(ref(db, 'gameTimer'), timeRemaining);

            timerInterval = setInterval(() => {
                timeRemaining--;
                set(ref(db, 'gameTimer'), timeRemaining);
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    callback();
                }
            }, 1000);
        }

        function startMatch(players) {
            set(ref(db, 'chat'), null);
            nextRound();
        }

        function nextRound() {
            onValue(ref(db, 'players'), (snapshot) => {
                const players = snapshot.val() || {};
                const playerKeys = Object.keys(players);
                if (playerKeys.length < 2) return;

                // Host determines rotation parameters
                const randomDrawer = playerKeys[Math.floor(Math.random() * playerKeys.length)];
                const randomWord = wordsList[Math.floor(Math.random() * wordsList.length)];

                set(ref(db, 'canvasCommands'), { type: "clear" });
                set(ref(db, 'gameState'), {
                    state: "playing",
                    drawer: randomDrawer,
                    currentWord: randomWord
                });

                // 5-minute round limit timer (300 seconds)
                startHostTimer(300, () => {
                    broadcastMessage("System", `Time's up! The word was ${randomWord}.`);
                    nextRound();
                });
            }, { onlyOnce: true });
        }

        function declareWinner(winnerName) {
            gameState = "gameover";
            clearInterval(timerInterval);
            alert(`🎉 ${winnerName} has reached 10 points and won the entire game!`);
            
            // Clean up and reset database states back to base lobby structure
            set(ref(db, 'gameState'), { state: "lobby" });
            set(ref(db, 'canvasCommands'), { type: "clear" });
            set(ref(db, 'chat'), null);
            
            // Wipe running total point scores
            onValue(ref(db, 'players'), (snapshot) => {
                const players = snapshot.val() || {};
                Object.keys(players).forEach(name => {
                    update(ref(db, `players/${name}`), { score: 0 });
                });
            }, { onlyOnce: true });
        }
    </script>
</body>
</html>
